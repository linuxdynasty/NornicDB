name: CI

on:
  push:
    branches:
      - "main"
    paths:
      - "docker/**"
      - "lib/**"
      - "macos/**"
      - "pkg/**"
      - "plugins/**"
      - "scripts/**"
      - "ui/**"
      - "go.mod"
      - "go.sum"
  pull_request:
    branches:
      - "main"
    paths:
      - "docker/**"
      - "lib/**"
      - "macos/**"
      - "pkg/**"
      - "plugins/**"
      - "scripts/**"
      - "ui/**"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch, tag, or commit SHA to run CI against"
        required: true
        default: "main"
        type: string

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Build
        run: make build

      - name: Test
        run: make test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    env:
      COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Prepare llama CPU libs
        run: |
          LLAMA_VERSION="$(sed -n 's/^LLAMA_VERSION ?= //p' Makefile | head -n1)"
          if [ -z "$LLAMA_VERSION" ]; then
            echo "Failed to determine LLAMA_VERSION from Makefile" >&2
            exit 1
          fi
          LLAMA_IMAGE="timothyswt/llama-cpu-libs:${LLAMA_VERSION}"
          docker pull "$LLAMA_IMAGE"
          CID="$(docker create --platform linux/amd64 "$LLAMA_IMAGE")"
          trap 'docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT
          mkdir -p lib/llama
          docker cp "$CID:/output/lib/libllama_combined.a" "lib/llama/libllama_linux_amd64.a"
          docker cp "$CID:/output/include/." "lib/llama/"

      - name: Generate coverage report
        run: |
          go list ./pkg/... \
            | grep -Ev 'github.com/orneryd/nornicdb/pkg/cypher/(fn|testutil)$|github.com/orneryd/nornicdb/pkg/graphql/generated$|github.com/orneryd/nornicdb/pkg/nornicgrpc/gen$|github.com/orneryd/nornicdb/pkg/localllm$|github.com/orneryd/nornicdb/pkg/gpu($|/)' \
            | xargs go test -coverprofile=coverage.raw.out
          {
            echo "mode: set"
            grep -Ev '^mode: |github.com/orneryd/nornicdb/pkg/cypher/antlr/(cypher_parser|cypher_lexer|cypherparser_listener|cypherparser_base_listener)\.go:' coverage.raw.out
          } > coverage.out

      - name: Install goveralls
        run: go install github.com/mattn/goveralls@latest

      - name: Upload coverage to Coveralls
        if: ${{ env.COVERALLS_REPO_TOKEN != '' }}
        run: |
          "$(go env GOPATH)/bin/goveralls" \
            -coverprofile=coverage.out \
            -service=github \
            -repotoken="$COVERALLS_REPO_TOKEN"
